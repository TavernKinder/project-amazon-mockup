<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="pages/checkout.js" defer></script>
</head>
<body>
    <header class="items-center justify-center flex h-16 bg-gray-800 text-white">
        <h3 class="text-[#FF9900]"><a href="index.html">AMAZON CLONE</a></h3>
        <div>
        <input type="text" placeholder="Search for products..." class="ml-4 px-4 py-2 rounded">
        <button class="ml-2 bg-amazon-yellow text-black px-4 py-2 rounded hover:bg-yellow-600">Search</button>
        </div>
        <h3 class="ml-4"><a href="checkout.html">Cart (<span id="cartLength">0</span>)</a></h3>
    </header>
    <main>
        <h1 class="text-2xl font-bold mt-8 mb-4">Checkout</h1>
        <div id="cartItems" class="space-y-4">
            <!-- Cart items will be dynamically added here -->
        </div>
        <div class="mt-8">
            <h2 class="text-xl font-bold">Total: $<span id="totalPrice">0.00</span></h2>
            <button class="mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600" id="checkoutButton">Proceed to Checkout</button>
        </div>
</body>
</html>
